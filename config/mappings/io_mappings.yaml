# COBOL CALL 'XXXIO' → Java Repository/Service 映射
#
# 设计原则（config 驱动，py 不写死）：
#   CALL 'xxxIO' 都是查表子程序，翻译固定化 → 统一由下方 io_default_pattern 自动派生 Repository。
#   io_programs 只登记「非标准的增量覆盖」（如某表 READR 用 findByPolicyNo 而非 findByKey）；
#   类名/字段名/参数结构体/import/标准操作码一律不重复抄写，全部按范式派生。
#   后续新增固化标准 → 改本文件；新增「翻译规则逻辑」→ 改 translator/rules.py 脚本。

# ── *IO 查表派生范式（通用，所有 *IO 适用）────────────────────────────────────
# 名 SCF4CHRIO → base=SCF4CHR → 类 Scf4chr+class_suffix；字段 scf4chr+field_suffix
# 参数结构体 = SCF4CHR+param_struct_suffix；import = import_package + 类名
io_default_pattern:
  class_suffix: "Repository"
  field_suffix: "Repository"
  param_struct_suffix: "-PARAMS"
  import_package: "com.example.repository"
  # 查询方法名以功能码结尾（驼峰）：READR→...Readr（单条），BEGN→...Begn（返回 List）。
  # 只放「单条操作」功能码 → 单方法替换（obj = repo.method(obj);）。
  # BEGN：在 structure_rewrite 未吸收的单次 BEGN 调用中作为 READR 等价物兜底。
  #   BEGN+NEXTR 循环仍由 structure_rewrite 吸收为 for(Rec r : list)。
  #   其他顺序读功能码不在本表（正确形态由 rewrite 吸收），以防 LLM 误生。
  operations:           # COBOL 单条操作功能码 → Repository 方法（{key}/{entity} 由引擎替换为参数对象）
    READR: "findByKeyReadr({key})"
    READS: "findByKeyReads({key})"
    BEGN:  "findByKeyBegn({key})"      # 单次定位（非循环内），等价于 READR
    UPDAT: "save({entity})"
    WRITE: "save({entity})"
    WRITR: "save({entity})"
    WRITS: "save({entity})"
    REWRT: "save({entity})"
    DELET: "delete({entity})"          # 步骤11 决策 W-4 选项①：传实体对象，最贴 Spring Data，免键派生

# ── 非标准覆盖项（只写与范式不同的增量；其余字段自动派生并深合并）──────────────
# 这里仅声明「方法名非标准」的表；其余功能码仍走范式。查询方法名同样以功能码结尾。
io_programs:
  CHDRENQIO:
    operations: {READR: "findByPolicyNoReadr({policyNo})"}
  CLNTIO:
    operations: {READR: "findByClientNoReadr({clientNo})"}
  AGNTIO:
    operations: {READR: "findByAgentNoReadr({agentNo})"}

