# config/skeleton_spec.yaml —— COBOL 骨架文法规范（正本，项目核心资产）
#
# 用途：把 COBOL 过程语法「格式化」成构造表 —— 段内块构造（IF/EVALUATE/PERFORM）的开块/头部边界/
#       子区/闭合/对应 Java 骨架，外加段间控制流（GO TO/fall-through）的降级策略。
#       translator.segmenter._Parser 是 block_grammar 的实现、translator.rules.build_section 是
#       control_flow 的实现；代码服从本规范。引擎经 config.grammar_loader 取规范，不直读本文件。
# 对应设计：docs/详细设计/步骤08-文法驱动骨架构建设计.md §3.1(b)。
# 配套正本：config/segmentation_spec.yaml（物理切分：列模型 / 词法 / paragraph）。
#
# 原则：补 COBOL 语法 = 先在此加构造，再在实现补对应分支（config 先行、实现跟随）；不做读 yaml 的通用解释器。
#
# block_grammar 每条字段释义：
#   id            —— 构造标识
#   cobol         —— 该构造的 COBOL 语法形态
#   meaning       —— 语义 + 切分要点（句点作用域、嵌套）
#   trigger       —— 触发该构造的首关键字（_Parser 据此分派）
#   opens_block   —— 是否开嵌套块
#   header_until  —— 头部（条件/主语/循环头）收集到何类 token 停（verb/period/scope_terminator/具体词）
#   regions       —— 子区名 → 该子区 parse_statements 的 stop 集（递归切块边界）
#   closed_by     —— explicit: 显式终止符；implicit: period(句点) / none
#   java_skeleton —— 对应 Java 骨架样式 id（实现侧据此渲染）
#   sample        —— cobol → java 对照

block_grammar:

  - id: if
    cobol: "IF cond [THEN] stmts... [ELSE stmts...] END-IF / ."
    meaning: |
      二分支。条件后可省略 THEN。then 区到 ELSE 或 END-IF 止；有 ELSE 则 else 区到 END-IF 止。
      旧式无 END-IF 时由句点闭合，且一个句点可同时关掉多层嵌套 IF（句点作用域）。
    trigger: IF
    opens_block: true
    header_until: [THEN, verb, period, scope_terminator]   # 条件 token 收集终点
    regions:
      then: [ELSE, END-IF]      # then 分支 stop 集（叠加外层 stop）
      else: [END-IF]            # else 分支 stop 集
    closed_by: { explicit: END-IF, implicit: period }
    java_skeleton: if_else
    sample:
      - cobol: "IF WSAA-FOUND = 'Y' MOVE 1 TO WSAA-N ELSE MOVE 0 TO WSAA-N END-IF"
        java:  'if (wsaaFound.equals("Y")) { wsaaN = 1; } else { wsaaN = 0; }'

  - id: evaluate
    cobol: "EVALUATE subject WHEN v1 stmts WHEN v2 stmts [WHEN OTHER stmts] END-EVALUATE"
    meaning: |
      多分支（含 EVALUATE TRUE 形态）。先收主语，再逐个 WHEN：每个 WHEN 收条件值、其后语句为该分支体。
      WHEN OTHER 对应 default。各分支体到下一个 WHEN 或 END-EVALUATE 止。
    trigger: EVALUATE
    opens_block: true
    header_until: [WHEN, END-EVALUATE, period]   # 主语收集终点
    regions:
      whens: [WHEN, END-EVALUATE]                # 每个 WHEN 体的 stop 集（重复区）
    closed_by: { explicit: END-EVALUATE, implicit: period }
    java_skeleton: switch
    sample:
      - cobol: "EVALUATE WSAA-CODE WHEN 'A' PERFORM 100-A WHEN OTHER CONTINUE END-EVALUATE"
        java:  'switch (wsaaCode) { case "A": p100A(); break; default: break; }'

  - id: perform
    cobol: "PERFORM [para [THRU para2]] | PERFORM [VARYING..|UNTIL..|n TIMES] stmts END-PERFORM"
    meaning: |
      两形态：① out-of-line —— 头部为过程名(可带 THRU 范围)、无内联体 → 子程序调用；
      ② inline —— 头部为循环子句(UNTIL/VARYING/TIMES)、其后语句为循环体到 END-PERFORM 止 → 循环。
      头部遇到首个动词即认为内联体开始；遇句点/终止符/END-PERFORM 则无内联体。
    trigger: PERFORM
    opens_block: true
    header_until: [verb, period, scope_terminator, END-PERFORM]   # 循环头/过程名收集终点
    regions:
      body: [END-PERFORM]        # 内联循环体 stop 集
    closed_by: { explicit: END-PERFORM, implicit: none }
    java_skeleton: loop_or_call  # 有 UNTIL/VARYING/TIMES → while/for；裸过程名 → method-call
    # 循环子句复杂变体（步骤16 正本；rules._perform_loop 实现跟随）：
    loop:
      test_before:  "默认 / WITH TEST BEFORE：UNTIL cond → while (!(cond)) {…}（先判后做，零回归）"
      test_after:   "WITH TEST AFTER（仅无 VARYING，D16-1）：UNTIL cond → do {…} while (!(cond));（先做一次再判，do-while）"
      varying_after: "VARYING i … UNTIL ci AFTER j … UNTIL cj [AFTER k …]（D16-2）→ 逐子句嵌套 for（i 最外、末子句最内），任意层"
      conservative: "VARYING+TEST AFTER 叠加 / 任一子句条件兜不住 → 整条 PERFORM 落 LLM 叶子（all-or-nothing，不出半个/误译循环，D16-3）"
    # 单条 PERFORM <过程名>（无 THRU、无循环；步骤15 C-3 正本；rules._perform_single_paragraph 实现跟随）：
    single:
      section:    "target 是已知 SECTION → this.<sec>();（真实方法已在，零回归）"
      paragraph:  "target 是 paragraph（proc_order 中恰一次、非 SECTION、合成名不撞 SECTION 方法名）→ 登记单单元合成方法 pXxx()（体=该 paragraph）、调用点 this.pXxx();（渲染期补出方法定义，B1 补实参）"
      unresolved: "target 不在 proc_order / 重名 / 撞 SECTION 方法名 → 保守 this.pXxx() + 前置可见 // TODO 人工核对，不臆造（消除静默坏调用）"
    # PERFORM A THRU B 范围语义（步骤12 §2 正本；rules._perform_range 实现跟随）：
    #   COBOL THRU = 顺序执行「源码中从段 A 到段 B 之间的全部段」。绝不能只译 A 而丢中间段。
    thru:
      single_unit:   "A 与 B 同段（B 即 A 的 EXIT 哨兵，区间内仅 1 段）→ 单调用 pA();"
      cross_section: "A、B 均为已知 SECTION 且 B 在 A 之后 → 按全程序段顺序展开区间内每段调用 pA();pMid();…;pB();（不丢中间段）"
      unresolved:    "端点非已知 SECTION（paragraph 级）或区间无法确定 → 退化 pA() + // TODO 人工核对（不臆测中间段）"
      # paragraph 级 THRU（步骤13 §2.2/§2.3 正本；rules._perform_range 第二级查找实现跟随）：
      paragraph_intra_section: "A、B 为 paragraph 且在全程序 proc_order 中各恰出现一次、B 在 A 之后 → 路线b：合成区间方法 aThruB()，方法体=区间内各过程单元体按 proc_order 顺序拼接后整体翻译一次，调用点单次 this.aThruB();（同段、跨段同一套实现，D2）"
      cross_section_paragraph: "区间跨 SECTION 同样走 paragraph 级合成（proc_order 含 SECTION 头单元，天然覆盖）；端点缺失/重名/B 在 A 之前/区间夹畸形单元（D3 保守）→ 退化 pA() + // TODO 人工核对，不臆测"
      # 区间内 GO TO（步骤14 §2.2 正本；合成区间方法保留 paragraph 标签后，由 build_section 状态机路由）：
      goto_intra_range:  "区间内 GO TO 目标 ∈ 区间各单元标签 → 合成方法体内状态机精确跳转 __pc=\"target\"; continue FLOW;（回跳=循环、前向=跳过中间单元，D14-3=a 前向亦建状态机；仅作用于合成区间方法，普通 SECTION 渲染不变）"
      goto_range_exit:   "区间内 GO TO 目标 = 区间出口（B 的 EXIT 段 / GOBACK / STOP）→ return;（提前结束本次 PERFORM，返回调用点）"
      goto_out_of_range: "区间内 GO TO 目标 ∉ 区间标签（他段 paragraph / SECTION）→ 保守 // TODO-GOTO 人工核对（目标为已知 SECTION 时保留 call+return），不臆测跳出后物理落点（D14-4）"
    sample:
      - cobol: "PERFORM 2000-INIT THRU 2000-INIT-EXIT   (区间仅本段)"
        java:  "p2000Init();"
      - cobol: "PERFORM 2000-PA THRU 2000-PC   (区间内 2000-PB 回跳 GO TO 2000-PA，步骤14)"
        java:  'this.pa2000ThruPc2000(wsaa);   // 合成方法体内 switch(__pc) 状态机，回跳 __pc="2000-PA"; continue FLOW; 循环不丢'
      - cobol: "PERFORM 1000-A THRU 3000-C   (跨段：A→B→C 三段)"
        java:  "p1000A(); p2000B(); p3000C();   // PERFORM 1000-A THRU 3000-C（展开 3 段）"
      - cobol: "PERFORM UNTIL WSAA-EOF = 'Y' READ ELPO-FILE END-PERFORM"
        java:  'while (!wsaaEof.equals("Y")) { readElpoFile(); }'

# ── 段间控制流降级策略（paragraph 级 CFG → 结构化/状态机，build_section 实现侧据此选路）──
control_flow:
  back_edge_to_state_machine: true   # 存在回跳 GO TO(目标段索引≤当前)→ FLOW:while(true)+switch(__pc)
  fall_through: continue_next        # 段尾无 transfer(GO TO/EXIT/GOBACK) → 顺序流入下一段
  flat_when_no_back_edge: true       # 无回跳 → 扁平拼接各段骨架 + `// paragraph <名>` 注释
  idioms:                            # 可归约惯用式，优先于状态机降级（已有改写）
    - id: begn_self_loop
      cobol: "段内 CALL…BEGN…IF…GO TO 自身(NEXTR 取下一条)"
      meaning: "BEGN+NEXTR 自跳读取循环 → 改写为 List + for-each，吸收 setFunction/跳出/NEXTR"
      java_skeleton: foreach
