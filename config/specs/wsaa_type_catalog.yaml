# WSAA（WORKING-STORAGE）COBOL 构造 → Java 映射目录（样例 + 完整性清单）
#
# 用途：把一个 WS 块里**会出现的全部 COBOL 构造/类型**一处列清，每种给 COBOL→Java 样例，
#       供「不遗漏」核对。与 type_mappings.yaml 分工：
#         - type_mappings.yaml = 机器匹配规则（pattern→java_type，pic.py 消费）；
#         - 本文件             = 人读目录 + 样例 + 覆盖清单（设计/核对用，非运行时消费）。
# 对应设计：docs/详细设计/步骤03-WSAA块翻译设计.md、步骤04-WSAA遗留补全设计.md。
# 决策依据：knowledge/wsaa_translation_decisions.md（各情况怎么判、为什么）。
#
# 覆盖来源：scripts/scan_ws_types.py 扫描 ZPOLDWNMWSAA.cob 得 64 种 PIC 签名 / 22 处 REDEFINES。
#           换程序后重跑该脚本，把新出现、下表未覆盖的签名补进对应 family（保证不遗漏）。

# ── 标量类型族 ──────────────────────────────────────────────
families:

  - id: char
    cobol: "PIC X(n) / A(n)"
    java: "String"
    width: "n"
    samples:
      - { cobol: "01 WSAA-STATUZ PIC X(04).",            java: 'private String wsaaStatuz = "";' }
      - { cobol: "01 WSAA-NAME PIC X(30) VALUE SPACES.",  java: 'private String wsaaName = "";' }
    seen: "X, X(2)…X(1000)（最多 1 字符到 1000 字符）"

  - id: int_display
    cobol: "PIC 9(n) / S9(n)，n≤9，无 V"
    java: "int"
    width: "n（S 不占位）"
    samples:
      - { cobol: "01 WSAA-AGE PIC 9(06).",       java: "private int wsaaAge = 0;" }
      - { cobol: "01 WSAA-NUM-DAYS PIC S9(3).",  java: "private int wsaaNumDays = 0;" }
    seen: "9(2)…9(8), S9(3) S9(4) S9(5) S9(8)"

  - id: long_display
    cobol: "PIC 9(n) / S9(n)，n>9，无 V"
    java: "long"
    width: "n"
    samples:
      - { cobol: "01 WSAA-DATE PIC 9(10).",   java: "private long wsaaDate = 0;" }
      - { cobol: "01 WSAA-STR-IN PIC 9(13).", java: "private long wsaaStrIn = 0;" }
    seen: "9(10), 9(13)"

  - id: decimal_display
    cobol: "PIC 9(m)V9(k) / S9(m)V9(k)（隐含小数点 V，无 COMP）"
    java: "BigDecimal（scale=k）"
    width: "m+k（V/S 不占位）"
    samples:
      - { cobol: "01 WSAA-PREMIUM-VAL PIC 9(15)V99.", java: "private BigDecimal wsaaPremiumVal = BigDecimal.ZERO;" }
      - { cobol: "01 WSAA-PC-UNITSA PIC S9(3)V99.",   java: "private BigDecimal wsaaPcUnitsa = BigDecimal.ZERO;" }
    seen: "9(15)V9(2), 9(13)V9(2), 9(10)V9(2), S9(15)V9(2), S9(3)V9(2)"

  - id: comp3_int
    cobol: "PIC S9(n) COMP-3（打包十进制，无 V）"
    java: "long"
    width: "ceil((n+1)/2) 打包字节"
    samples:
      - { cobol: "01 WS003-CVALUE PIC S9(12) COMP-3.", java: "private long ws003Cvalue = 0;" }
    seen: "S9(2/3/4/7/8/9/12) COMP-3"

  - id: comp3_decimal
    cobol: "PIC S9(m)V9(k) COMP-3"
    java: "BigDecimal（scale=k）"
    width: "ceil((m+k+1)/2) 打包字节"
    samples:
      - { cobol: "01 WSAA-CURR-YEARS PIC S9(11)V9(07) COMP-3.", java: "private BigDecimal wsaaCurrYears = BigDecimal.ZERO;" }
    seen: "S9(11)V9(7), S9(15)V9(2), S9(10)V9(5), S9V9(4) COMP-3"

  - id: edited
    cobol: "数字编辑 PIC（含 Z 零抑制 / 插入 . ,）"
    java: "String（显示格式串）"
    width: "显示位数（含插入字符各 1；不建模数值语义）"
    samples:
      - { cobol: "05 WSXX-INSTPREM PIC Z(11)9.99.", java: 'private String wsxxInstprem = "";' }
      - { cobol: "05 WSXX-AGE PIC Z(2)9.",          java: 'private String wsxxAge = "";' }
    seen: "Z9, Z(2)9, Z(11)9.9(2), Z(14)9.9(2)"

  - id: indicator
    cobol: "PIC 1 [INDICATOR]"
    java: "boolean"
    width: "0（不参与字符切片）"
    samples:
      - { cobol: "03 INDIC-TABLE OCCURS 99 PIC 1 INDICATOR 1.", java: "private boolean[] indicTable = new boolean[99];" }
    seen: "1"

# ── 结构 / 聚合构造 ────────────────────────────────────────
structures:

  - id: group
    cobol: "组项（无 PIC，含子项）"
    java: "子字段平铺 + // ── 组名 ── 注释"
    sample_cobol: "01 WSAA-OCDATE.\n  03 WSAA-OCDATE01 PIC S9(02) COMP-3."
    sample_java: "// ── 01 WSAA-OCDATE ──\nprivate long wsaaOcdate01 = 0;"

  - id: occurs_1d
    cobol: "OCCURS n（一维）"
    java: "T[] = new T[n]（下标 i-1）"
    sample_cobol: "03 WSAA-T3721-NOPRPOL OCCURS 260."
    note: "祖先链累计维度；scan 见一维 24 处"

  - id: occurs_2d
    cobol: "嵌套 OCCURS（二维）"
    java: "T[][] = new T[d1][d2]"
    note: "scan 见二维 3 处"

  - id: filler
    cobol: "FILLER"
    java: "不生成字段，仅计长度/偏移（视图切片用）"
    note: "scan 见 15 处"

  - id: cond_values
    cobol: "88 名 VALUES 'V1' 'V2' …"
    java: "public boolean 名(){ return f.equals(\"V1\") || …; }"
    sample_cobol: "88 IS-6PWB VALUE '6PWB'."
    sample_java: 'public boolean is6pwb(){ return wsaaVal28Prd.equals("6PWB"); }'
    note: "scan 见取值列表 10 处"

  - id: cond_indicator
    cobol: "88 名 VALUE B'0' / B'1'（INDICATOR 布尔，挂在 OCCURS PIC 1 上）"
    java: "带下标布尔：public boolean indOn(int i){ return arr[i-1]; }（B'1'）/ !arr[i-1]（B'0'）"
    note: "步骤04 补全；scan 见 2 处（IND-ON/IND-OFF）"

# ── REDEFINES 子类（共 5 种；处理分支见 knowledge/wsaa_translation_decisions.md）──
redefines:

  - id: char_over_char
    cobol: "字符别名/组 over 字符（含字符数组 over 字符）"
    java: "对目标字符视图做定宽 get/set 切片；数组子项→ getX(int i)/setX(int i,String)"
    sample_cobol: "01 WSAA-PVAL REDEFINES WSAA-PVALUE.\n  03 WSAA-P PIC X(2) OCCURS 5."
    sample_java: "public String getP(int i){ return _pad(wsaaPvalue,10).substring((i-1)*2,(i-1)*2+2); }"
    seen: "WSAA-PVAL, WSAA-CTRL-FLGS, WSAA-RLDGACCT-ST, WSAA-WPRM-OCCDATE-N（4）"

  - id: chars_over_numeric
    cobol: "字符/数值子项 over 数值（DISPLAY backing）"
    java: "backing 数值 ↔ 定宽数字串(_toDigits/_fromDigits)；子项按类型切片 get/set"
    sample_cobol: "01 WSAA-AMOUNT1 PIC 9(15)V99.\n01 WSAA-AMOUNT1-RED REDEFINES WSAA-AMOUNT1.\n  03 WSAA-AMOUNT1-CHAR PIC X(17)."
    sample_java: "public String getWsaaAmount1Char(){ return _toDigits(wsaaAmount1,17,2); }"
    seen: "WSAA-AMOUNT1-RED…WSAA-INVCAMT-RED, WSAA-RES-CRRCD 的 FILLER（11）"

  - id: numeric_over_char
    cobol: "数值别名 over 字符组"
    java: "数值 = parse(目标组存储串)；set 写回定宽数字串"
    sample_cobol: "01 WSAA-STRING.\n  03 WSAA-SEX PIC X(01).\n  03 WSAA-ISSUE-AGE PIC 9(02).\n01 WSAA-STRING-R REDEFINES WSAA-STRING PIC 9(03)."
    sample_java: "public int getWsaaStringR(){ return Integer.parseInt(_storageOfWsaaString().trim()); }"
    seen: "WSAA-STRING-R, WSAA-STRING-R-2（2）"

  - id: target_missing
    cobol: "REDEFINES 目标被 !!!!!! 停用或不在块内（拆解已丢弃）"
    java: "别名是该存储唯一存活定义 → 按自身 PIC 当主字段/组渲染，去掉 REDEFINES 语义"
    sample_cobol: "01 WSAA-CVCP-AMOUNT-D REDEFINES WSAA-CVCP-AMOUNT PIC S9(15)V9(2)."
    sample_java: "private BigDecimal wsaaCvcpAmountD = BigDecimal.ZERO; // 原 REDEFINES 目标已停用，按主定义渲染"
    seen: "WSAA-CVCP-AMOUNT-D（1）"

  - id: in_occurs_context
    cobol: "REDEFINES 处于 OCCURS 数组元素内"
    java: "（暂留 TODO）定宽标量视图不适用，需按下标参数化，人工核对"
    seen: "WSXX-PCESTRM-R, WSXX-RCESTRM-R, WS01-PCESTRM-R, WS02-PCESTRM-R（4）"

